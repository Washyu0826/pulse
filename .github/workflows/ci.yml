name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-lint-test:
    name: API · Lint + Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install deps
        working-directory: api
        run: uv sync --extra dev  # 含 ruff / pytest / pytest-asyncio
      - name: Lint
        working-directory: api
        run: uv run ruff check .
      - name: Test
        working-directory: api
        env:
          DATABASE_URL: postgresql+asyncpg://pulse:pulse@localhost:5432/pulse_test
          DATABASE_URL_SYNC: postgresql://pulse:pulse@localhost:5432/pulse_test
        run: uv run pytest

  web-lint-build:
    name: Web · Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # 尚未提交 package-lock.json，故用 npm install（非 npm ci）且不開快取。
      # TODO: 本機 `npm install` 產生 package-lock.json 後，改回 npm ci + setup-node cache。
      - name: Install
        working-directory: web
        run: npm install
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Build
        working-directory: web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
