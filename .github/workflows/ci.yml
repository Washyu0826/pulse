name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-lint-test:
    name: API · Lint + Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install deps
        working-directory: api
        run: uv sync --extra dev  # 含 ruff / pytest / pytest-asyncio
      - name: Lint
        working-directory: api
        run: uv run ruff check .
      - name: Test
        working-directory: api
        env:
          DATABASE_URL: postgresql+asyncpg://pulse:pulse@localhost:5432/pulse_test
          DATABASE_URL_SYNC: postgresql://pulse:pulse@localhost:5432/pulse_test
        run: uv run pytest

  web-lint-build:
    name: Web · Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        # 用 npm install（非 npm ci）：lockfile 在 Windows 端開發生成，npm 會裁掉
        # Linux 才需要的 optional 相依（@emnapi，來自 eslint resolver 的 wasm fallback），
        # 導致嚴格的 npm ci 在 Linux CI 報 "Missing from lock file"。npm install 會在
        # CI 平台自行補齊。詳見 docs/sprints/sprint4-ci-fixes.md。
        run: npm install --no-audit --no-fund
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Test
        working-directory: web
        run: npm test  # vitest run（前端單元測試：lib 工具 / TrendChart / FeedFilter / FavoriteButton）
      - name: Build
        working-directory: web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  ml-lint-test:
    name: ML · Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # 純函式測試（情緒/事件/品質/去重）不需 torch/transformers（皆 lazy import）→ 輕量安裝。
      - name: Install
        run: pip install pytest ruff
      - name: Lint
        working-directory: ml
        run: ruff check .
      - name: Test
        working-directory: ml
        env:
          PYTHONPATH: ${{ github.workspace }}/ml
        run: python -m pytest tests -q

  workers-lint-test:
    name: Workers · Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # 爬蟲純函式測試只需 httpx/asyncpraw/tenacity（不需 airflow/selenium/torch）。
      # pytest-asyncio 必裝：crawler 測試是 async def + @pytest.mark.asyncio，沒有它
      # 會以 "async def functions are not natively supported" 整批失敗。
      - name: Install
        run: pip install pytest pytest-asyncio ruff httpx asyncpraw tenacity
      - name: Lint
        working-directory: workers
        run: ruff check .
      - name: Test
        working-directory: workers
        env:
          PYTHONPATH: ${{ github.workspace }}/workers
        run: python -m pytest tests -q
