# Alembic config. URL is injected from env (DATABASE_URL_SYNC) in env.py.
# Keep this file ASCII-only: configparser reads it with the OS locale codec
# (cp950 on zh-TW Windows), so non-ASCII here breaks `alembic` on Windows.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

# sqlalchemy.url is intentionally left blank; env.py sets it at runtime.

[post_write_hooks]
# exec mode runs the `ruff` executable on PATH (works under `uv run`);
# more portable than console_scripts entrypoint lookup across environments.
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
