# Alembic config. URL is injected from env (DATABASE_URL_SYNC) in env.py.
# Keep this file ASCII-only: configparser reads it with the OS locale codec
# (cp950 on zh-TW Windows), so non-ASCII here breaks `alembic` on Windows.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

# sqlalchemy.url is intentionally left blank; env.py sets it at runtime.

[post_write_hooks]
# Auto-fix lint (Union->|, import sort) then format every generated migration,
# so generated files pass CI's `ruff check .`. exec mode = run `ruff` on PATH
# (works under `uv run`); more portable than console_scripts entrypoint lookup.
hooks = ruff_check, ruff_format
ruff_check.type = exec
ruff_check.executable = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
