x-airflow-common: &airflow-common
  # 自建 image：官方 Airflow + 跑 DAG 需要的執行期依賴（見 workers/Dockerfile.airflow）。
  build:
    context: .
    dockerfile: workers/Dockerfile.airflow
  image: pulse-airflow:2.9.3
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # 由 .env 注入；缺值即報錯（fail fast），不再帶不安全的 repo 內預設值。
    # 本機開發：在 .env 設一組自產的值即可（見 .env.example 的產生指令）。
    # FERNET_KEY 仍允許空（Airflow 會以警告退化，僅影響 connection 加密；prod 務必設定）。
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:?AIRFLOW_WEBSERVER_SECRET_KEY 未設定 —— 請在 .env 自行產生（見 .env.example）}
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    # production：關掉 SQLAlchemy echo（否則每個 task 會把整串 SQL 灌進 Airflow log）。
    ENVIRONMENT: production
    # 讓 DAG 能 import api / ml / crawlers / pipeline 套件（原始碼用 volume 掛進來，見下方 volumes）。
    PYTHONPATH: /opt/airflow/src/api:/opt/airflow/src/ml:/opt/airflow/src/workers
    # 業務 DB / 憑證用環境變數注入 —— 變數名須對齊 api.config.Settings 欄位（無 env_prefix），
    # 故用 DATABASE_URL 而非 PULSE_DATABASE_URL；host 用 compose service 名 `db`（非 127.0.0.1）。
    DATABASE_URL: postgresql+asyncpg://pulse:pulse@db/pulse
    REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
    REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    # Threads 爬蟲 cookie（crawl_threads DAG 用，best-effort 選配；缺則未登入模式）。
    THREADS_SESSIONID: ${THREADS_SESSIONID:-}
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    # Slack 失敗告警：以 Airflow Variable 形式注入（callback best-effort 讀取，空值則略過）。
    AIRFLOW_VAR_SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    # StatsD 指標 → statsd-exporter（→ Prometheus → Grafana）。需 image 內裝 statsd 套件。
    AIRFLOW__METRICS__STATSD_ON: "True"
    AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: "9125"
    AIRFLOW__METRICS__STATSD_PREFIX: airflow
  volumes:
    - ./workers/dags:/opt/airflow/dags
    - ./workers/plugins:/opt/airflow/plugins
    # 原始碼掛載（editable）：改 DAG / 爬蟲 / pipeline 免重 build。
    - ./api:/opt/airflow/src/api:ro
    - ./ml:/opt/airflow/src/ml:ro
    - ./workers:/opt/airflow/src/workers:ro
    - airflow_logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-init:
      condition: service_completed_successfully
    db:
      # 業務 DB 健康才起 webserver/scheduler，避免冷啟動時爬蟲先觸發、連不到 DB 白白燒 retry。
      condition: service_healthy

services:
  # ===== 業務資料庫 =====
  db:
    image: postgres:16-alpine
    container_name: pulse-db
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports:
      # host 埠用 5433：避開常見的本機 PostgreSQL（佔 5432）衝突。
      # 容器內仍是 5432；其他容器用 service name `db:5432` 連，不受影響。
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ===== 業務 API（FastAPI / uvicorn）=====
  api:
    build:
      context: ./api          # api/Dockerfile 的 COPY 路徑（pyproject/alembic.ini/alembic）皆相對 api/
      dockerfile: Dockerfile
    image: pulse-api:0.1.0
    container_name: pulse-api
    environment:
      # 容器內連 db 服務名與「容器內」5432（非 host 的 5433）。變數名須對齊 api.config.Settings 欄位。
      DATABASE_URL: postgresql+asyncpg://pulse:pulse@db:5432/pulse
      DATABASE_URL_SYNC: postgresql://pulse:pulse@db:5432/pulse
      # 今日事件 / 議題演變來源檔（pipeline 產出 JSONL）—— 下方 volume 把 host 的 ./data 掛進 /app/data。
      PULSE_EVENTS_FILE: /app/data/events_today.jsonl
      PULSE_STORYLINES_FILE: /app/data/storylines.jsonl
      # CORS：放行容器化 web 對外埠（瀏覽器端若直打 API 才會用到；server 端 fetch 不受 CORS 限制）。
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8010"]'
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8010:8000"           # 對外沿用 8010（與本機手動 uvicorn 慣例一致）；容器內 8000。
    volumes:
      # 事件摘要來源檔唯讀掛入（pipeline 寫在 host ./data，API 只讀）。
      - ./data:/app/data:ro
      # collection router 重用 monorepo 的 ml 純函式（collection_pack / summarize）；
      # 它把「容器內 /ml」加進 sys.path（= /app/api/routers/collection.py 的 parents[3]/ml）。
      # 掛 host ./ml → /ml，使 `import ml.collection_pack`（= /ml/ml/...）可解析。唯讀、editable。
      - ./ml:/ml:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # python 內建 urllib 打健康端點（slim image 無 curl）；DB 通才算健康。
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ===== 前端 Web（Next.js 14 standalone）=====
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: pulse-web:0.1.0
    container_name: pulse-web
    environment:
      # Server Component 端 fetch 走內網（容器→容器），指向 api 服務名與容器內 8000。
      API_URL_INTERNAL: http://api:8000
      # 瀏覽器端若有 client fetch 才用得到 —— 走 host 對外埠。
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8010}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # node 內建 http 打首頁；standalone runner image 無 curl/wget。
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ===== Airflow Metadata DB（獨立）=====
  airflow-postgres:
    image: postgres:16-alpine
    container_name: pulse-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ===== Airflow Init（一次性 migration + create admin user）=====
  airflow-init:
    build:
      context: .
      dockerfile: workers/Dockerfile.airflow
    image: pulse-airflow:2.9.3
    container_name: pulse-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      # admin 帳密由 .env 注入；缺值即報錯（fail fast），不再硬編 admin:admin。
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:?AIRFLOW_ADMIN_USER 未設定 —— 請在 .env 設定（見 .env.example）}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD 未設定 —— 請在 .env 設定（見 .env.example）}
    command: version
    user: "${AIRFLOW_UID:-50000}:0"

  # ===== Airflow Webserver =====
  airflow-webserver:
    <<: *airflow-common
    container_name: pulse-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ===== Airflow Scheduler =====
  airflow-scheduler:
    <<: *airflow-common
    container_name: pulse-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ===== 監控：Airflow StatsD → statsd-exporter → Prometheus → Grafana + cAdvisor =====
  statsd-exporter:
    image: prom/statsd-exporter:v0.27.1
    container_name: pulse-statsd-exporter
    command:
      - "--statsd.mapping-config=/etc/statsd/statsd_mapping.yml"
      - "--statsd.listen-udp=:9125"
      - "--web.listen-address=:9102"
    volumes:
      - ./monitoring/statsd/statsd_mapping.yml:/etc/statsd/statsd_mapping.yml:ro
    ports:
      - "9102:9102"      # /metrics（除錯用）
      - "9125:9125/udp"  # StatsD ingest（Airflow → 此）
    healthcheck:
      # statsd-exporter（busybox 基底，有 wget）→ 抓自己的 /metrics 確認 web server 活著。
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9102/metrics"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: pulse-cadvisor
    privileged: true
    ports:
      - "8081:8080"      # host 8081（8080 給 airflow-webserver）；容器內仍 8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      # 註：Docker Desktop/WSL2 下 /var/lib/docker 掛載會壞，刻意省略（仍能報 CPU/mem）。
    devices:
      - /dev/kmsg:/dev/kmsg
    healthcheck:
      # cAdvisor 標準健康端點 /healthz（容器內埠 8080）。
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: pulse-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # 讓 Prometheus 抓得到 host 上的 API（埠見 prometheus.yml）
    healthcheck:
      # Prometheus 標準健康端點 /-/healthy（busybox 基底，有 wget）。
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: pulse-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"      # host 3001（3000 給 Next.js dev）；容器內仍 3000
    depends_on:
      - prometheus
    healthcheck:
      # Grafana 標準健康端點 /api/health（image 內有 wget）。
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_postgres_data:
  airflow_logs:
  prometheus_data:
  grafana_data:
