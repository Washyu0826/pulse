x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__WEBSERVER__SECRET_KEY: "pulse-dev-secret-change-in-prod"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    # 把業務 DB 用環境變數注入，DAG 可以連
    PULSE_DATABASE_URL: postgresql+asyncpg://pulse:pulse@db/pulse
    PULSE_REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
    PULSE_REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
    PULSE_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    PULSE_SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
  volumes:
    - ./workers/dags:/opt/airflow/dags
    - ./workers/plugins:/opt/airflow/plugins
    - airflow_logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-init:
      condition: service_completed_successfully

services:
  # ===== 業務資料庫 =====
  db:
    image: postgres:16-alpine
    container_name: pulse-db
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ===== Airflow Metadata DB（獨立）=====
  airflow-postgres:
    image: postgres:16-alpine
    container_name: pulse-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ===== Airflow Init（一次性 migration + create admin user）=====
  airflow-init:
    image: apache/airflow:2.9.3-python3.11
    container_name: pulse-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: version
    user: "${AIRFLOW_UID:-50000}:0"

  # ===== Airflow Webserver =====
  airflow-webserver:
    <<: *airflow-common
    container_name: pulse-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ===== Airflow Scheduler =====
  airflow-scheduler:
    <<: *airflow-common
    container_name: pulse-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Week 11 加入: MLflow server
  # mlflow:
  #   image: ghcr.io/mlflow/mlflow:latest
  #   ...

  # Week 11 加入: Prometheus + Grafana
  # prometheus:
  #   ...

volumes:
  postgres_data:
  airflow_postgres_data:
  airflow_logs:
