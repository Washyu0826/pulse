# Prometheus 抓取設定。Prometheus 在容器內：in-compose 服務用 service 名；
# host 上跑的 API（uvicorn）用 host.docker.internal。
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警規則（DAG 失敗 / scheduler 心跳消失 / 資料新鮮度）。
# 註：Alertmanager 路由尚未接（無 alertmanager service）→ 規則會在 Prometheus
#     /alerts 顯示但不會外送通知；接 Alertmanager + Slack 是後續工作（follow-up）。
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: airflow-statsd
    static_configs:
      - targets: ["statsd-exporter:9102"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]   # 容器內埠 8080（host 上對映 8081）

  - job_name: pulse-api
    metrics_path: /metrics
    static_configs:
      # FastAPI 跑在 host（不在 compose）→ 用 host.docker.internal 抓 host 埠。
      # 本機慣用埠 8010（見 docs 與本機跑法）；若以別埠啟 uvicorn 需同步改此處
      # （或日後改用環境變數模板化 target）。
      - targets: ["host.docker.internal:8010"]
