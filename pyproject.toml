[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".venv",
    "node_modules",
    ".next",
    "alembic/versions",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "N"]
ignore = ["E501", "B008"]

[tool.mypy]
python_version = "3.11"
strict = true
exclude = ["alembic/versions/", "tests/"]
